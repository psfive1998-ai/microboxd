let currentCategory = "all";
let currentSubCategory = "all";
let currentMicrobe = null;
let logged = new Set();

function renderGrid() {

    const grid = document.getElementById("microGrid");

    let filtered = bacteria.filter(m => {

        const categoryMatch =
            currentCategory === "all" ||
            m.category === currentCategory;

        const subCategoryMatch =
            currentSubCategory === "all" ||
            m.subCategory === currentSubCategory;

        return categoryMatch && subCategoryMatch;

    });

    grid.innerHTML = filtered.map(generateCard).join("");

}

function generateCard(m){

    return `

    <div class="micro-card" onclick="openDetail(${m.id})">

        <h3>${m.name}</h3>

        <strong><em>${m.sci}</em></strong>

        <p>${m.category}</p>

        <small>${m.subCategory}</small>

    </div>

    `;

}

function openDetail(id){

    currentMicrobe = bacteria.find(m => m.id == id);

    if(!currentMicrobe) return;

    document.getElementById("sheetName").textContent =
        currentMicrobe.name;

    document.getElementById("sheetSci").textContent =
        currentMicrobe.sci;

    document.getElementById("sheetDesc").textContent =
        currentMicrobe.desc;

    document
        .getElementById("detailOverlay")
        .classList.add("open");

}

function closeDetail(){

    document
        .getElementById("detailOverlay")
        .classList.remove("open");

}

function setCategory(category){

    currentCategory = category;

    currentSubCategory = "all";

    renderGrid();

}

function setSubCategory(sub){

    currentSubCategory = sub;

    renderGrid();

}

function searchMicrobes(text){

    text = text.toLowerCase();

    const grid = document.getElementById("microGrid");

    const filtered = bacteria.filter(m=>{

        const matchesSearch =
            m.name.toLowerCase().includes(text) ||
            m.sci.toLowerCase().includes(text) ||
            m.category.toLowerCase().includes(text) ||
            m.subCategory.toLowerCase().includes(text);

        const matchesCategory =
            currentCategory=="all" ||
            m.category==currentCategory;

        const matchesSub =
            currentSubCategory=="all" ||
            m.subCategory==currentSubCategory;

        return matchesSearch &&
               matchesCategory &&
               matchesSub;

    });

    grid.innerHTML =
        filtered.map(generateCard).join("");

}

window.onload = function () {
    renderGrid();
};
</script>
