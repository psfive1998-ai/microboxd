<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Microboxd — Bacteria Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #111113;
      --surface:   #18181b;
      --surface2:  #1e1e23;
      --border:    #2a2a32;
      --text:      #e8e6e0;
      --muted:     #6b6b78;
      --accent:    #b8f5c2;
      --accent-dim:#1a2e1c;
      --accent-fg: #0a2a10;
      --font:      'Inter', sans-serif;
      --serif:     'Playfair Display', Georgia, serif;
    }

    body {
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 56px;
      background: rgba(17,17,19,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
    }
    .logo {
      font-family: var(--serif);
      font-size: 22px; letter-spacing: -0.3px;
      color: var(--accent);
    }
    .logo span { color: var(--text); font-style: italic; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .badge-count {
      background: var(--accent-dim); color: var(--accent);
      font-size: 11px; font-weight: 500;
      padding: 3px 10px; border-radius: 20px;
    }

    /* ── HERO STRIP ── */
    .hero {
      padding: 28px 24px 20px;
      border-bottom: 0.5px solid var(--border);
    }
    .hero-eyebrow {
      font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px;
    }
    .hero h1 {
      font-family: var(--serif); font-size: 28px; font-weight: 400;
      line-height: 1.25; margin-bottom: 18px;
    }
    .hero h1 em { color: var(--accent); font-style: normal; }
    .search-wrap {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 12px; padding: 11px 16px;
    }
    .search-wrap input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-size: 14px; font-family: var(--font);
    }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap i { color: var(--muted); font-size: 18px; }

    /* ── FILTER PILLS ── */
    .filters {
      display: flex; gap: 8px; padding: 14px 24px;
      overflow-x: auto; border-bottom: 0.5px solid var(--border);
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
    .pill {
      flex-shrink: 0;
      padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 500;
      border: 0.5px solid var(--border); background: var(--surface);
      color: var(--muted); cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .pill.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
    .pill:hover:not(.active) { color: var(--text); border-color: #444; }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
      color: var(--muted); padding: 18px 24px 10px;
    }

    /* ── GRID ── */
    .micro-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1px; background: var(--border);
      margin: 0;
    }
    .micro-card {
      background: var(--bg); cursor: pointer;
      transition: background 0.15s;
      position: relative; overflow: hidden;
    }
    .micro-card:hover { background: var(--surface); }
    .card-img-wrap {
      position: relative; width: 100%; padding-bottom: 100%;
      overflow: hidden; background: var(--surface2);
    }
    .card-img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; transition: transform 0.3s;
    }
    .micro-card:hover .card-img { transform: scale(1.04); }
    .card-placeholder {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
    }
    .card-placeholder .emoji { font-size: 36px; }
    .card-placeholder .label { font-size: 10px; color: var(--muted); }
    .gram-badge {
      position: absolute; top: 8px; left: 8px;
      font-size: 9px; padding: 2px 8px; border-radius: 4px;
      font-weight: 600; letter-spacing: 0.3px;
      backdrop-filter: blur(6px);
    }
    .gram-pos { background: rgba(255,200,100,0.15); color: #f5c842; }
    .gram-neg { background: rgba(100,180,255,0.15); color: #6eb8f5; }
    .gram-afast { background: rgba(200,100,100,0.15); color: #f56e6e; }
    .logged-check {
      position: absolute; top: 8px; right: 8px;
      background: var(--accent); color: var(--accent-fg);
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
    }
    .card-info { padding: 10px 12px 12px; }
    .card-info h3 { font-size: 13px; font-weight: 500; margin-bottom: 2px; line-height: 1.3; }
    .card-info .sci { font-size: 10px; color: var(--muted); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-stars { margin-top: 5px; color: var(--accent); font-size: 11px; letter-spacing: 1px; }
    .card-stars span { color: var(--muted); font-size: 10px; margin-left: 3px; letter-spacing: 0; }

    /* ── PROFILE BAR ── */
    .profile-section { padding: 20px 24px 24px; }
    .profile-card {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 14px; padding: 16px;
    }
    .profile-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent-dim); display: flex;
      align-items: center; justify-content: center;
      font-size: 15px; color: var(--accent); font-weight: 600;
      flex-shrink: 0;
    }
    .profile-info { flex: 1; }
    .profile-info .name { font-size: 14px; font-weight: 500; }
    .profile-info .stats { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .rank-pill {
      background: var(--accent-dim); color: var(--accent);
      font-size: 11px; font-weight: 500; padding: 5px 12px; border-radius: 8px;
    }

    /* ── NAV ── */
    .nav-tabs {
      display: flex; border-top: 0.5px solid var(--border);
      background: var(--surface); position: sticky; bottom: 0;
    }
    .nav-tab {
      flex: 1; padding: 12px 8px; text-align: center;
      font-size: 10px; color: var(--muted); cursor: pointer;
      border-top: 2px solid transparent; transition: all 0.15s;
    }
    .nav-tab.active { color: var(--accent); border-top-color: var(--accent); }
    .nav-tab i { display: block; font-size: 20px; margin-bottom: 2px; }

    /* ── DETAIL PANEL ── */
    .detail-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.88); align-items: flex-end; justify-content: center;
    }
    .detail-overlay.open { display: flex; }
    .detail-sheet {
      background: var(--surface); border-radius: 20px 20px 0 0;
      width: 100%; max-width: 680px; max-height: 92vh; overflow-y: auto;
    }
    .sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 14px auto 0; }

    .sheet-hero {
      position: relative; width: 100%; height: 220px;
      overflow: hidden; background: var(--surface2);
    }
    .sheet-hero img { width: 100%; height: 100%; object-fit: cover; }
    .sheet-hero .gradient { position: absolute; inset: 0; background: linear-gradient(to top, var(--surface) 0%, transparent 55%); }
    .sheet-hero .placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 80px; display:none; }

    .sheet-body { padding: 0 20px 32px; }
    .sheet-top { display: flex; align-items: flex-start; justify-content: space-between; padding: 14px 0 8px; }
    .sheet-top h2 { font-family: var(--serif); font-size: 22px; font-weight: 400; }
    .sheet-top .sci-name { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 2px; }
    .close-btn {
      background: var(--surface2); border: 0.5px solid var(--border);
      border-radius: 50%; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted); flex-shrink: 0; margin-left: 12px;
    }
    .close-btn:hover { color: var(--text); }

    .desc-text { font-size: 13px; color: #999; line-height: 1.7; margin-bottom: 16px; }

    .facts-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .fact {
      background: var(--surface2); border: 0.5px solid var(--border);
      border-radius: 10px; padding: 8px 14px;
      font-size: 12px; color: var(--muted);
    }
    .fact strong { display: block; font-size: 10px; color: var(--accent); font-weight: 500; margin-bottom: 2px; letter-spacing: 0.3px; }

    .action-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .btn-log {
      flex: 1; padding: 12px; border-radius: 10px; border: none;
      background: var(--accent); color: var(--accent-fg);
      font-size: 14px; font-weight: 500; cursor: pointer;
      font-family: var(--font); transition: background 0.15s;
    }
    .btn-log.logged { background: var(--accent-dim); color: var(--accent); }
    .btn-wishlist {
      padding: 12px 16px; border-radius: 10px;
      border: 0.5px solid var(--border); background: none;
      color: var(--muted); cursor: pointer; font-size: 20px;
    }
    .btn-wishlist:hover { color: var(--text); background: var(--surface2); }

    .divider { height: 0.5px; background: var(--border); margin: 4px 0 16px; }
    .reviews-heading { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

      border-radius: 12px; padding:
