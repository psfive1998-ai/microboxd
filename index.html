<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Microboxed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ── CNN-STYLE SCROLLING TICKER ── */
    .live-ticker {
      background: var(--surface2);
      border-bottom: 0.5px solid var(--border);
      padding: 8px 0;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
      width: 100%;
    }
    .ticker-track {
      display: inline-block;
      white-space: nowrap;
      animation: tickerScroll 90s linear infinite;
    }
    .live-ticker:hover .ticker-track {
      animation-play-state: paused;
    }
    .ticker-item {
      display: inline-block;
      padding: 0 24px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
    .ticker-item strong {
      color: var(--accent);
      font-weight: 500;
    }
    .ticker-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background-color: var(--lethal);
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
      animation: pulse 1.5s infinite;
    }
    @keyframes tickerScroll {
      0% { transform: translateX(100vw); }
      100% { transform: translateX(-100%); }
    }
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #111113;
      --surface:   #18181b;
      --surface2:  #1e1e23;
      --border:    #2a2a32;
      --text:      #e8e6e0;
      --muted:     #6b6b78;
      --accent:    #b8f5c2;
      --accent-dim:#1a2e1c;
      --accent-fg: #0a2a10;
      --font:      'Inter', sans-serif;
      --serif:     'Playfair Display', Georgia, serif;
      --benign:    #5ce67e;
      --moderate:  #ffb84d;
      --lethal:    #ff4d4d;
    }
    body {
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .app-view { display: none; flex: 1; width: 100%; }
    .app-view.active-view { display: block !important; }
    .placeholder-view { padding: 60px 24px; text-align: center; color: var(--muted); }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      gap: 12px;
    }
    .topbar-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: 0.5px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .topbar-btn:hover { color: var(--text); border-color: #444; }
    .topbar-btn.primary { border-color: var(--accent); color: var(--accent); }
    .logo { font-family: var(--serif); font-size: 22px; letter-spacing: -0.3px; color: var(--accent); }
    .logo span { color: var(--text); font-style: italic; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .badge-count { background: var(--accent-dim); color: var(--accent); font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
    .hero { padding: 28px 24px 20px; border-bottom: 0.5px solid var(--border); }
    .hero-eyebrow { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .hero h1 { font-family: var(--serif); font-size: 28px; font-weight: 400; line-height: 1.25; margin-bottom: 18px; }
    .hero h1 em { color: var(--accent); font-style: normal; }
    .search-wrap { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 11px 16px; }
    .search-wrap input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 14px; font-family: var(--font); }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap i { color: var(--muted); font-size: 18px; }
    .filters { display: flex; gap: 8px; padding: 14px 24px; overflow-x: auto; border-bottom: 0.5px solid var(--border); scrollbar-width: none; }
    #gramFilters { padding-top: 4px; padding-bottom: 14px; }
    #gramFilters .pill { font-size: 11px; padding: 5px 13px; opacity: 0.9; }
    .filters::-webkit-scrollbar { display: none; }
    .pill { flex-shrink: 0; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 0.5px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .pill.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
    .pill:hover:not(.active) { color: var(--text); border-color: #444; }
    .section-label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 18px 24px 10px; }
    .micro-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1px; background: var(--border); margin: 0; }
    .micro-card { background: var(--bg); cursor: pointer; transition: background 0.15s; position: relative; overflow: hidden; }
    .micro-card:hover { background: var(--surface); }
    .card-info { padding: 10px 12px 12px; }
    .card-info h3 { font-size: 13px; }
    .sci { font-size: 11px; color: var(--muted); font-style: italic; margin-top: 2px; }
    .nav-tabs { position: sticky; bottom: 0; z-index: 50; display: flex; background: var(--surface); border-top: 0.5px solid var(--border); height: 60px; }
    .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; color: var(--muted); cursor: pointer; gap: 4px; }
    .nav-tab.active { color: var(--accent); }

    /* ── Log & Review feature ── */
    .log-section { margin-top: 20px; padding-top: 18px; border-top: 0.5px solid var(--border); }
    .log-section h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 10px; }
    .star-picker { display: flex; gap: 4px; margin-bottom: 10px; }
    .star-picker span { font-size: 22px; cursor: pointer; color: var(--border); transition: color 0.1s; }
    .star-picker span.filled { color: var(--accent); }
    .log-textarea { width: 100%; min-height: 70px; background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; padding: 10px; color: var(--text); font-family: var(--font); font-size: 13px; resize: vertical; outline: none; }
    .log-submit-btn { margin-top: 10px; background: var(--accent); color: var(--accent-fg); border: none; padding: 9px 18px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .log-submit-btn:hover { opacity: 0.9; }
    .log-status { font-size: 11px; color: var(--accent); margin-top: 8px; }
    .review-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
    .review-card .review-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .review-card .review-user { font-size: 12px; font-weight: 600; color: var(--text); }
    .review-card .review-stars { font-size: 11px; color: var(--accent); }
    .review-card .review-text { font-size: 12px; color: #b5b5be; line-height: 1.5; }
    .review-card.mine { border-color: var(--accent); }

    .mylog-overlay { position: fixed; inset: 0; z-index: 110; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; justify-content: flex-end; flex-direction: column; }
    .mylog-overlay.open { display: flex; }
    .mylog-sheet { background: var(--bg); border-top: 0.5px solid var(--border); border-top-left-radius: 20px; border-top-right-radius: 20px; max-height: 88vh; overflow-y: auto; }
    .mylog-body { padding: 24px; }
    .mylog-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .mylog-top h2 { font-family: var(--serif); font-size: 22px; font-weight: 400; }
    .mylog-entry { display: flex; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid var(--border); cursor: pointer; }
    .mylog-entry:hover { background: var(--surface); }
    .mylog-entry .mylog-info { flex: 1; }
    .mylog-entry h3 { font-size: 13px; }
    .mylog-entry .review-stars { font-size: 11px; color: var(--accent); }
    .mylog-entry .review-text { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .mylog-empty { text-align: center; color: var(--muted); font-size: 13px; padding: 40px 0; }

    /* ── Auth modal ── */
    .auth-overlay { position: fixed; inset: 0; z-index: 120; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; }
    .auth-overlay.open { display: flex; }
    .auth-sheet { background: var(--bg); border: 0.5px solid var(--border); border-radius: 16px; width: 90%; max-width: 360px; }
    .auth-body { padding: 24px; }
    .auth-tabs { display: flex; gap: 8px; margin-top: 4px; }
    .auth-input { width: 100%; background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: var(--font); font-size: 13px; outline: none; margin-top: 10px; }
    .detail-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; justify-content: flex-end; flex-direction: column; }
    .detail-overlay.open { display: flex; }
    .detail-sheet { background: var(--bg); border-top: 0.5px solid var(--border); border-top-left-radius: 20px; border-top-right-radius: 20px; max-height: 88vh; overflow-y: auto; display: flex; flex-direction: column; }
    .sheet-body { padding: 24px 24px 40px; }
    .sheet-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .sheet-top h2 { font-family: var(--serif); font-size: 24px; font-weight: 400; }
    .sci-name { font-style: italic; color: var(--muted); font-size: 13px; margin-top: 2px; }
    .close-btn { width: 32px; height: 32px; background: var(--surface); border: 0.5px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .desc-text { font-size: 13px; color: #b5b5be; line-height: 1.6; margin-top: 16px; }
    .live-ticker {
      background: var(--surface2);
      border-bottom: 0.5px solid var(--border);
      padding: 8px 0;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
      width: 100%;
    }
    .ticker-track {
      display: inline-block;
      white-space: nowrap;
      animation: tickerScroll 90s linear infinite;
    }
    .live-ticker:hover .ticker-track {
      animation-play-state: paused;
    }
    .ticker-item {
      display: inline-block;
      padding: 0 24px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
    .ticker-item strong {
      color: var(--accent);
      font-weight: 500;
    }
    .ticker-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background-color: var(--lethal);
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
      animation: pulse 1.5s infinite;
    }
    @keyframes tickerScroll {
      0% { transform: translateX(100vw); }
      100% { transform: translateX(-100%); }
    }
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
<div class="topbar">
  <div class="logo">micro<span>boxed</span></div>
  <div class="topbar-right">
    <span class="badge-count" id="logCount">0 logged</span>
    <div class="topbar-btn" onclick="openMyLog()">My Log</div>
    <div class="topbar-btn primary" id="accountPill" onclick="handleAccountPillClick()">Sign In</div>
  </div>
</div>
<div class="hero">
  <div class="hero-eyebrow">🦠 Pathogen Edition</div>
  <h1>What have you <em>encountered?</em></h1>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search by name, category..." oninput="searchMicrobes(this.value)" />
  </div>
</div>
<div class="filters">
  <div class="pill active" onclick="setCategory('all')">All</div>
  <div class="pill" onclick="setCategory('bacteria')">Bacteria</div>
  <div class="pill" onclick="setCategory('virus')">Viruses</div>
  <div class="pill" onclick="setCategory('parasite')">Parasites</div>
  <div class="pill" onclick="setCategory('fungi')">Fungi</div>
</div>
<div class="filters" id="gramFilters" style="display:none; padding-top:0;">
  <div class="pill active" onclick="setGramFilter('all')">All Bacteria</div>
  <div class="pill" onclick="setGramFilter('gram-positive')">Gram +</div>
  <div class="pill" onclick="setGramFilter('gram-negative')">Gram −</div>
  <div class="pill" onclick="setGramFilter('acid-fast')">Acid-Fast</div>
</div>
<div class="live-ticker">
  <span class="ticker-dot"></span>
  <div class="ticker-track" id="tickerTrack"></div>
</div>
<div class="section-label">Popular pathogens</div>
<div id="microGrid" class="micro-grid"></div>
<div id="detailOverlay" class="detail-overlay">
  <div class="detail-sheet">
    <div id="sheetImgContainer" style="width: 100%; height: 200px; background: #000; overflow: hidden; display: none;">
      <img id="sheetImg" src="" alt="" style="width: 100%; height: 100%; object-fit: cover; display: block;"
           onerror="this.onerror=null; this.src='https://upload.wikimedia.org/wikipedia/commons/4/41/No_image_available_600x450.svg';">
    </div>
    <div class="sheet-body">
      <div class="sheet-top">
        <div>
          <h2 id="sheetName"></h2>
          <div class="sci-name" id="sheetSci"></div>
        </div>
        <div class="close-btn" onclick="closeDetail()">✕</div>
      </div>
      <div id="sheetFacts"></div>
      <p class="desc-text" id="sheetDesc"></p>

      <div class="log-section">
        <h4>Your Log</h4>
        <div class="star-picker" id="starPicker">
          <span data-v="1" onclick="selectStar(1)">★</span>
          <span data-v="2" onclick="selectStar(2)">★</span>
          <span data-v="3" onclick="selectStar(3)">★</span>
          <span data-v="4" onclick="selectStar(4)">★</span>
          <span data-v="5" onclick="selectStar(5)">★</span>
        </div>
        <textarea class="log-textarea" id="logText" placeholder="Notes on your encounter (optional)..."></textarea>
        <button class="log-submit-btn" onclick="submitLog()">Log this pathogen</button>
        <div class="log-status" id="logStatus"></div>
      </div>

      <div class="log-section">
        <h4>Reviews</h4>
        <div id="reviewsList"></div>
      </div>
    </div>
  </div>
</div>

<div class="mylog-overlay" id="mylogOverlay">
  <div class="mylog-sheet">
    <div class="mylog-body">
      <div class="mylog-top">
        <h2>My Log</h2>
        <div class="close-btn" onclick="closeMyLog()">✕</div>
      </div>
      <div id="mylogList"></div>
    </div>
  </div>
</div>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-sheet">
    <div class="auth-body">
      <div class="mylog-top">
        <h2 id="authTitle">Sign Up</h2>
        <div class="close-btn" onclick="closeAuthModal()">✕</div>
      </div>
      <div class="auth-tabs">
        <div class="pill active" id="tabSignup" onclick="switchAuthTab('signup')">Sign Up</div>
        <div class="pill" id="tabLogin" onclick="switchAuthTab('login')">Log In</div>
      </div>
      <input type="email" id="authEmail" class="auth-input" placeholder="Email" />
      <input type="password" id="authPassword" class="auth-input" placeholder="Password (min 6 characters)" />
      <button class="log-submit-btn" id="authSubmitBtn" onclick="submitAuth()">Sign Up</button>
      <div class="log-status" id="authStatus"></div>
    </div>
  </div>
</div>
<script>

const bacteria = [
  {
    id: 1, name: 'E. coli', sci: 'Escherichia coli', severity: 'mild to lethal',
    category: 'gram-negative', subCategory: 'Gram −', gramClass: 'gram-neg',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Escherichia_coli_electron_microscopy.jpg/960px-Escherichia_coli_electron_microscopy.jpg',
    emoji: '🦠',
    desc: 'One of the most studied organisms in biology. A facultative anaerobe living in the intestines of warm-blooded animals. Mostly harmless — but pathogenic strains like O157:H7 cause severe food poisoning.',
    facts: [{ l: 'Shape', v: 'Rod (bacillus)' }, { l: 'Gram', v: 'Negative' }, { l: 'Habitat', v: 'Intestines' }, { l: 'Rating', v: 'Moderate' }, { l: 'O₂', v: 'Facultative' }],
    reviews: [{ user: 'DrMaria', stars: 4, text: 'Found this in a water sample during fieldwork in Kenya. The rod-shaped cells under phase contrast were unmistakable.', photo: null }, { user: 'LabRat99', stars: 3, text: 'Classic model organism. Grows overnight on LB agar, golden colonies if you add the right plasmid!', photo: null }]
  },
  {
    id: 2, name: 'Staph aureus', sci: 'Staphylococcus aureus', severity: 'mild',
    category: 'gram-positive', subCategory: 'Gram +', gramClass: 'gram-pos',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/84/201708_Staphylococcus_aureus.svg/1280px-201708_Staphylococcus_aureus.svg.png?_=20170824150410',
    emoji: '🟡',
    desc: 'Golden grape-like clusters under the microscope. A formidable opportunistic pathogen causing everything from minor skin infections to life-threatening bacteremia. MRSA strains are a global health crisis.',
    facts: [{ l: 'Shape', v: 'Coccus' }, { l: 'Gram', v: 'Positive' }, { l: 'Colonies', v: 'Golden' }, { l: 'Rating', v: 'Moderate' }, { l: 'MRSA', v: 'Yes' }],
    reviews: [{ user: 'ClinMicro', stars: 5, text: 'Isolated from a wound swab. The coagulase test confirmed it immediately. Always a thriller to see on a plate.', photo: null }]
  },
  {
    id: 3, name: 'M. tuberculosis', sci: 'Mycobacterium tuberculosis', severity: 'lethal',
    category: 'acid-fast', subCategory: 'Acid-fast', gramClass: 'gram-afast',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/Mycobacterium_Tuberculosis_Bacteria%2C_the_Cause_of_TB.jpg/960px-Mycobacterium_Tuberculosis_Bacteria%2C_the_Cause_of_TB.jpg',
    emoji: '🔴',
    desc: 'The ancient enemy. Has co-evolved with humans for thousands of years. Acid-fast due to its waxy mycolic acid cell wall — requires Ziehl-Neelsen staining to visualise. Extraordinarily slow growing.',
    facts: [{ l: 'Shape', v: 'Rod' }, { l: 'Stain', v: 'Acid-fast' }, { l: 'Growth', v: 'Very slow (weeks)' }, { l: 'Rating', v: 'Lethal' }, { l: 'O₂', v: 'Obligate aerobe' }],
    reviews: [{ user: 'PulmPath', stars: 5, text: 'Spotted bright red rods on a Ziehl-Neelsen smear. One of those career moments you never forget.', photo: null }]
  },
  {
    id: 4, name: 'Strep pneumoniae', sci: 'Streptococcus pneumoniae', severity: 'moderate',
    category: 'gram-positive', subCategory: 'Gram +', gramClass: 'gram-pos',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Streptococcus_pneumoniae-263.jpg/960px-Streptococcus_pneumoniae-263.jpg',
    emoji: '🫁',
    desc: 'Lancet-shaped diplococci in pairs. A leading cause of pneumonia, meningitis, and otitis media worldwide. Has a distinctive polysaccharide capsule that helps it evade immune defenses.',
    facts: [{ l: 'Shape', v: 'Diplococcus' }, { l: 'Gram', v: 'Positive' }, { l: 'Capsule', v: 'Yes' }, { l: 'Rating', v: 'Moderate' }, { l: 'Alpha-haemolytic', v: 'Yes' }],
    reviews: []
  },
  {
    id: 5, name: 'Salmonella', sci: 'Salmonella enterica', severity: 'moderate',
    category: 'gram-negative', subCategory: 'Gram −', gramClass: 'gram-neg',
    img: 'https://www.microbiologyinpictures.com/bacteria-photos/salmonella-photos/salmonella-typhimurium.jpg',
    emoji: '🍳',
    desc: 'A leading cause of foodborne illness globally. Motile, facultative anaerobe. Invades intestinal epithelial cells causing gastroenteritis. Typhoid fever is caused by serovar Typhi.',
    facts: [{ l: 'Shape', v: 'Rod' }, { l: 'Gram', v: 'Negative' }, { l: 'Motile', v: 'Yes' }, { l: 'Rating', v: 'Moderate' }, { l: 'Source', v: 'Poultry, eggs' }],
    reviews: [{ user: 'FoodMicro', stars: 4, text: 'Recovered from a chicken sample. The H2S production on XLD agar gave black-centred colonies — classic.', photo: null }]
  },
  {
    id: 6, name: 'Helicobacter pylori', sci: 'Helicobacter pylori', severity: 'moderate',
    category: 'gram-negative', subCategory: 'Gram −', gramClass: 'gram-neg',
    img: 'https://www.researchgate.net/profile/Ali-Al-Ahmad/publication/351107186/figure/fig1/AS:1017089947078656@1619504548498/Morphology-of-H-pylori-Field-emission-scanning-electron-microscopic-FESEM-image-of-a.ppm',
    emoji: '🌀',
    desc: 'The corkscrew-shaped ulcer-maker. Lives in the harsh acidic environment of the stomach by producing urease to neutralise acid around it. A Nobel Prize-winning discovery linked it to peptic ulcers.',
    facts: [{ l: 'Shape', v: 'Helical rod' }, { l: 'Gram', v: 'Negative' }, { l: 'Habitat', v: 'Stomach' }, { l: 'Rating', v: 'Moderate' }, { l: 'Urease', v: 'Positive' }],
    reviews: [{ user: 'GastroDoc', stars: 5, text: 'The fact that this organism can survive stomach acid still amazes me. Barry Marshall was right all along.', photo: null }]
  },
  {
    id: 7, name: 'Treponema pallidum', sci: 'Treponema pallidum', severity: 'moderate',
    category: 'spirochete', subCategory: 'Spirochete', gramClass: 'gram-neg',
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Treponemapallidum.jpg/960px-Treponemapallidum.jpg',

let currentCategory = "all";

let currentGramFilter = "all";
let currentMicrobe = null;
let myLogs = {}; // populated from Supabase once logged in: { [microbeId]: { stars, text, date } }

let currentUser = null;
let authMode = 'signup';

const sbClient = supabase.createClient(
  'https://wlamupllaggzvtleqjvs.supabase.co',
  'sb_publishable_luIScwMzXejM0ifHBznu2Q_XQQCJ_iW'
);

sbClient.auth.onAuthStateChange(async (event, session) => {
    currentUser = session ? session.user : null;
    updateAuthUI();
    if (currentUser) {
        await loadLogsFromDB();
        closeAuthModal();
    } else {
        myLogs = {};
        updateLogCount();
    }
});

async function loadLogsFromDB() {
    if (!currentUser) return;
    const { data, error } = await sbClient
        .from('logs')
        .select('*')
        .eq('user_id', currentUser.id);
    if (error) { console.error('Failed to load logs:', error.message); return; }
    myLogs = {};
    data.forEach(row => {
        myLogs[row.microbe_id] = {
            stars: row.stars,
            text: row.text || '',
            date: new Date(row.created_at).toLocaleDateString()
        };
    });
    updateLogCount();
    if (currentMicrobe) renderReviews(currentMicrobe);
}

function updateAuthUI() {
    const pill = document.getElementById('accountPill');
    if (!pill) return;
    pill.textContent = currentUser ? 'Log Out' : 'Sign In';
    pill.classList.toggle('primary', !currentUser);
}

function handleAccountPillClick() {
    if (currentUser) {
        signOutUser();
    } else {
        openAuthModal();
    }
}

function openAuthModal() {
    document.getElementById('authOverlay').classList.add('open');
}

function closeAuthModal() {
    document.getElementById('authOverlay').classList.remove('open');
    document.getElementById('authStatus').textContent = '';
    document.getElementById('authEmail').value = '';
    document.getElementById('authPassword').value = '';
}

function switchAuthTab(mode) {
    authMode = mode;
    document.getElementById('tabSignup').classList.toggle('active', mode === 'signup');
    document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
    document.getElementById('authTitle').textContent = mode === 'signup' ? 'Sign Up' : 'Log In';
    document.getElementById('authSubmitBtn').textContent = mode === 'signup' ? 'Sign Up' : 'Log In';
    document.getElementById('authStatus').textContent = '';
}

async function submitAuth() {
    const email = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    const statusEl = document.getElementById('authStatus');

    if (!email || !password) {
        statusEl.textContent = 'Enter an email and password.';
        return;
    }
    statusEl.textContent = 'Working...';

    if (authMode === 'signup') {
        const { data, error } = await sbClient.auth.signUp({ email, password });
        if (error) { statusEl.textContent = error.message; return; }
        statusEl.textContent = 'Check your email to confirm your account, then log in.';
    } else {
        const { data, error } = await sbClient.auth.signInWithPassword({ email, password });
        if (error) { statusEl.textContent = error.message; return; }
        statusEl.textContent = 'Logged in!';
    }
}

async function signOutUser() {
    await sbClient.auth.signOut();
}

function generateCard(m) {
    let badge = "";
    const cat = (m.category || "").toLowerCase();
    const gramClass = (m.gramClass || "").toLowerCase();
    const isGramPos = cat.includes('gram-positive') || gramClass.includes('gram-positive');
    const isGramNeg = cat.includes('gram-negative') || gramClass.includes('gram-negative');

    // Muted, high-end color palette for the badges
    if (isGramPos) {
        badge = '<span style="display:inline-block; font-size:9px; background:#4a5568; padding:2px 8px; border-radius:4px; color:#f7fafc; font-weight:700; letter-spacing:0.05em; margin-bottom:5px;">GRAM +</span>';
    } else if (isGramNeg) {
        badge = '<span style="display:inline-block; font-size:9px; background:#a0aec0; padding:2px 8px; border-radius:4px; color:#2d3748; font-weight:700; letter-spacing:0.05em; margin-bottom:5px;">GRAM −</span>';
    } else if (cat.includes('virus')) {
        badge = '<span style="display:inline-block; font-size:9px; background:#cbd5e0; padding:2px 8px; border-radius:4px; color:#4a5568; font-weight:700; letter-spacing:0.05em; margin-bottom:5px;">VIRUS</span>';
    } else if (cat.includes('parasite')) {
        badge = '<span style="display:inline-block; font-size:9px; background:#e2e8f0; padding:2px 8px; border-radius:4px; color:#4a5568; font-weight:700; letter-spacing:0.05em; margin-bottom:5px;">PARASITE</span>';
    } else if (cat.includes('fungi')) {
        badge = '<span style="display:inline-block; font-size:9px; background:#9f7aea; padding:2px 8px; border-radius:4px; color:#f7fafc; font-weight:700; letter-spacing:0.05em; margin-bottom:5px;">FUNGI</span>';
    }

    return `
    <div class="micro-card" onclick="openDetail('${m.id}')">
        <div style="width: 100%; height: 130px; background: #000; overflow: hidden; border-bottom: 0.5px solid var(--border);">
            <img src="${m.img}" alt="${m.name}" style="width: 100%; height: 100%; object-fit: cover; display: block;"
                 onerror="this.onerror=null; this.src='https://upload.wikimedia.org/wikipedia/commons/4/41/No_image_available_600x450.svg';">
        </div>
        <div class="card-info">
            <div style="min-height: 15px;">${badge}</div>
            <h3>${m.name}</h3>
            <div class="sci"><em>${m.sci}</em></div>
        </div>
    </div>
    `;
}

function checkCategoryMatch(microbeCategory, filterCategory) {
    const cat = (microbeCategory || "").toLowerCase();
    const filter = filterCategory.toLowerCase();

    if (filter === "all") return true;
    
    if (filter === "bacteria") {
        return cat.includes("gram") || cat === "bacteria" || cat === "acid-fast" || cat === "spirochete" || cat === "anaerobe" || cat === "atypical";
    }
    
    return cat === filter;
}

function renderGrid() {
    const grid = document.getElementById("microGrid");
    if (!grid) return;

    let filtered = bacteria.filter(m => {
        const matchesCategory = checkCategoryMatch(m.category, currentCategory);
        const matchesSubCategory = currentSubCategory === "all" || m.subCategory === currentSubCategory;
        const matchesGram = currentGramFilter === "all" || (m.category || "").toLowerCase() === currentGramFilter || (m.gramClass || "").toLowerCase().includes(currentGramFilter);
        return matchesCategory && matchesSubCategory && matchesGram;
    });

    grid.innerHTML = filtered.map(generateCard).join("");
}
function openDetail(id) {
    currentMicrobe = bacteria.find(x => x.id == Number(id));
    if (!currentMicrobe) return;

    document.getElementById("sheetName").textContent = currentMicrobe.name;
    document.getElementById("sheetSci").innerHTML = `<em>${currentMicrobe.sci}</em>`;

    const imgContainer = document.getElementById("sheetImgContainer");
    const imgEl = document.getElementById("sheetImg");
    if (currentMicrobe.img) {
        imgEl.src = currentMicrobe.img;
        imgEl.alt = currentMicrobe.name;
        imgContainer.style.display = "block";
    } else {
        imgContainer.style.display = "none";
    }
    
    let factsHtml = '<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:16px 0; background:var(--surface); padding:12px; border-radius:8px; font-size:12px;">';
    if (currentMicrobe.facts) {
        currentMicrobe.facts.forEach(f => {
            factsHtml += `<div><span style="color:var(--muted);">${f.l}:</span> <strong>${f.v}</strong></div>`;
        });
    }
    factsHtml += '</div>';

    document.getElementById("sheetFacts").innerHTML = factsHtml;
    document.getElementById("sheetDesc").textContent = currentMicrobe.desc;

    // reset + prefill the log form for this microbe
    const existing = myLogs[currentMicrobe.id];
    selectedStars = existing ? existing.stars : 0;
    document.getElementById("logText").value = existing ? existing.text : "";
    document.getElementById("logStatus").textContent = existing ? "You logged this on " + existing.date : "";
    updateStarUI();
    renderReviews(currentMicrobe);

    document.getElementById("detailOverlay").classList.add("open");
}

function selectStar(n) {
    selectedStars = n;
    updateStarUI();
}

function updateStarUI() {
    document.querySelectorAll('#starPicker span').forEach(star => {
        star.classList.toggle('filled', Number(star.dataset.v) <= selectedStars);
    });
}

async function submitLog() {
    if (!currentMicrobe) return;
    if (!currentUser) {
        document.getElementById("logStatus").textContent = "Please sign in to save your log.";
        openAuthModal();
        return;
    }
    if (selectedStars === 0) {
        document.getElementById("logStatus").textContent = "Pick a star rating first.";
        return;
    }
    const text = document.getElementById("logText").value.trim();
    document.getElementById("logStatus").textContent = "Saving...";

    const { data, error } = await sbClient
        .from('logs')
        .upsert({
            user_id: currentUser.id,
            microbe_id: currentMicrobe.id,
            stars: selectedStars,
            text: text
        }, { onConflict: 'user_id,microbe_id' })
        .select();

    if (error) {
        document.getElementById("logStatus").textContent = "Error saving: " + error.message;
        return;
    }

    myLogs[currentMicrobe.id] = {
        stars: selectedStars,
        text: text,
        date: new Date().toLocaleDateString()
    };
    document.getElementById("logStatus").textContent = "Saved — logged on " + myLogs[currentMicrobe.id].date;
    updateLogCount();
    renderReviews(currentMicrobe);
}

function renderReviews(m) {
    const list = document.getElementById("reviewsList");
    const communityReviews = (m.reviews || []).map(r => `
        <div class="review-card">
            <div class="review-top">
                <span class="review-user">${r.user}</span>
                <span class="review-stars">${'★'.repeat(r.stars)}${'☆'.repeat(5 - r.stars)}</span>
            </div>
            <div class="review-text">${r.text}</div>
        </div>
    `).join("");

    const mine = myLogs[m.id];
    const myReviewHtml = mine ? `
        <div class="review-card mine">
            <div class="review-top">
                <span class="review-user">You</span>
                <span class="review-stars">${'★'.repeat(mine.stars)}${'☆'.repeat(5 - mine.stars)}</span>
            </div>
            <div class="review-text">${mine.text || '<em style="color:var(--muted)">No notes added.</em>'}</div>
        </div>
    ` : "";

    const combined = myReviewHtml + communityReviews;
    list.innerHTML = combined || '<div style="font-size:12px; color:var(--muted);">No reviews yet — be the first to log this one.</div>';
}

function updateLogCount() {
    const el = document.getElementById("logCount");
    if (el) el.textContent = `${Object.keys(myLogs).length} logged`;
}

        list.innerHTML = '<div class="mylog-empty">You haven\'t logged any pathogens yet. Open one and rate it to start your log.</div>';
    } else {
        list.innerHTML = ids.map(id => {
            const m = bacteria.find(x => x.id == Number(id));
            const entry = myLogs[id];
            if (!m || !entry) return "";
            return `
                <div class="mylog-entry" onclick="closeMyLog(); openDetail(${m.id});">
                    <div class="mylog-info">
                        <h3>${m.name}</h3>
                        <div class="review-stars">${'★'.repeat(entry.stars)}${'☆'.repeat(5 - entry.stars)} · ${entry.date}</div>
                        ${entry.text ? `<div class="review-text">${entry.text}</div>` : ""}
                    </div>
                </div>
            `;
        }).join("");
    }
    document.getElementById("mylogOverlay").classList.add("open");
}

function closeMyLog() {
    document.getElementById("mylogOverlay").classList.remove("open");
}
function closeDetail() {
    document.getElementById("detailOverlay").classList.remove("open");
}

function setCategory(category) {
    currentCategory = category;
    currentSubCategory = "all";
    currentGramFilter = "all";

    const pills = document.querySelectorAll('.filters .pill');
    pills.forEach(pill => {
        pill.classList.remove('active');
        const clickAttr = pill.getAttribute('onclick') || '';
        if (clickAttr.includes(`'${category}'`)) {
            pill.classList.add('active');
        }
    });

    const gramFilters = document.getElementById('gramFilters');
    if (gramFilters) {
        gramFilters.style.display = category === 'bacteria' ? 'flex' : 'none';
        gramFilters.querySelectorAll('.pill').forEach((p, i) => p.classList.toggle('active', i === 0));
    }

    renderGrid();
}

function setGramFilter(gram) {
    currentGramFilter = gram;
    document.querySelectorAll('#gramFilters .pill').forEach(pill => {
        pill.classList.remove('active');
        const clickAttr = pill.getAttribute('onclick') || '';
        if (clickAttr.includes(`'${gram}'`)) pill.classList.add('active');
    });
    renderGrid();
}

function searchMicrobes(text) {
    text = text.toLowerCase();
    const grid = document.getElementById("microGrid");
    if (!grid) return;

    const filtered = bacteria.filter(m => {
        const matchesSearch =
            (m.name || "").toLowerCase().includes(text) ||
            (m.sci || "").toLowerCase().includes(text) ||
            (m.category || "").toLowerCase().includes(text) ||
            (m.subCategory || "").toLowerCase().includes(text);

        const matchesCategory = checkCategoryMatch(m.category, currentCategory);
        const matchesSub = currentSubCategory === "all" || m.subCategory === currentSubCategory;
        const matchesGram = currentGramFilter === "all" || (m.category || "").toLowerCase() === currentGramFilter || (m.gramClass || "").toLowerCase().includes(currentGramFilter);

        return matchesSearch && matchesCategory && matchesSub && matchesGram;
    });
    
    grid.innerHTML = filtered.map(generateCard).join("");
}

const firstNames = ["Alex","Sam","Jordan","Priya","Wei","Noah","Fatima","Leo","Maya","Diego"];
const verbs = ["logged an encounter with", "added", "reviewed", "flagged"];
const locations = ["the United States", "China", "Brazil", "Germany", "India", "Nigeria", "Japan", "the UK", "Canada", "Mexico"];

function randomFeedItem() {
  const m = bacteria[Math.floor(Math.random() * bacteria.length)];
  const name = firstNames[Math.floor(Math.random() * firstNames.length)];
  const verb = verbs[Math.floor(Math.random() * verbs.length)];
  const loc = locations[Math.floor(Math.random() * locations.length)];
  return { m, name, verb, loc };
}

function buildTicker() {
  const track = document.getElementById("tickerTrack");
  if (!track) return;
  const items = Array.from({ length: 16 }, randomFeedItem);
  const sequence = [...items, ...items]; // duplicate for seamless loop
  track.innerHTML = sequence.map(({ m, name, verb, loc }) => `
    <span class="ticker-item">
      <strong>${name}</strong> ${verb} <strong>${m.name}</strong> in ${loc}
    </span>
  `).join("");
}

function pushLiveUpdate() {
  const track = document.getElementById("tickerTrack");
  if (!track) return;
  const { m, name, verb, loc } = randomFeedItem();
  const item = document.createElement("span");
  item.className = "ticker-item";
  item.innerHTML = `<strong>${name}</strong> ${verb} <strong>${m.name}</strong> in ${loc}`;
  track.prepend(item);
}

window.onload = function () {
    renderGrid();
    buildTicker();
    setInterval(pushLiveUpdate, 6000);
};
</script>
</body>
