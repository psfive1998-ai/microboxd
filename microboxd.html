<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Microboxd — Bacteria Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #111113;
      --surface:   #18181b;
      --surface2:  #1e1e23;
      --border:    #2a2a32;
      --text:      #e8e6e0;
      --muted:     #6b6b78;
      --accent:    #b8f5c2;
      --accent-dim:#1a2e1c;
      --accent-fg: #0a2a10;
      --font:      'Inter', sans-serif;
      --serif:     'Playfair Display', Georgia, serif;
    }

    body {
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 56px;
      background: rgba(17,17,19,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
    }
    .logo {
      font-family: var(--serif);
      font-size: 22px; letter-spacing: -0.3px;
      color: var(--accent);
    }
    .logo span { color: var(--text); font-style: italic; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .badge-count {
      background: var(--accent-dim); color: var(--accent);
      font-size: 11px; font-weight: 500;
      padding: 3px 10px; border-radius: 20px;
    }

    /* ── HERO STRIP ── */
    .hero {
      padding: 28px 24px 20px;
      border-bottom: 0.5px solid var(--border);
    }
    .hero-eyebrow {
      font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px;
    }
    .hero h1 {
      font-family: var(--serif); font-size: 28px; font-weight: 400;
      line-height: 1.25; margin-bottom: 18px;
    }
    .hero h1 em { color: var(--accent); font-style: normal; }
    .search-wrap {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 12px; padding: 11px 16px;
    }
    .search-wrap input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-size: 14px; font-family: var(--font);
    }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap i { color: var(--muted); font-size: 18px; }

    /* ── FILTER PILLS ── */
    .filters {
      display: flex; gap: 8px; padding: 14px 24px;
      overflow-x: auto; border-bottom: 0.5px solid var(--border);
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
    .pill {
      flex-shrink: 0;
      padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 500;
      border: 0.5px solid var(--border); background: var(--surface);
      color: var(--muted); cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .pill.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
    .pill:hover:not(.active) { color: var(--text); border-color: #444; }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
      color: var(--muted); padding: 18px 24px 10px;
    }

    /* ── GRID ── */
    .micro-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1px; background: var(--border);
      margin: 0;
    }
    .micro-card {
      background: var(--bg); cursor: pointer;
      transition: background 0.15s;
      position: relative; overflow: hidden;
    }
    .micro-card:hover { background: var(--surface); }
    .card-img-wrap {
      position: relative; width: 100%; padding-bottom: 100%;
      overflow: hidden; background: var(--surface2);
    }
    .card-img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; transition: transform 0.3s;
    }
    .micro-card:hover .card-img { transform: scale(1.04); }
    .card-placeholder {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
    }
    .card-placeholder .emoji { font-size: 36px; }
    .card-placeholder .label { font-size: 10px; color: var(--muted); }
    .gram-badge {
      position: absolute; top: 8px; left: 8px;
      font-size: 9px; padding: 2px 8px; border-radius: 4px;
      font-weight: 600; letter-spacing: 0.3px;
      backdrop-filter: blur(6px);
    }
    .gram-pos { background: rgba(255,200,100,0.15); color: #f5c842; }
    .gram-neg { background: rgba(100,180,255,0.15); color: #6eb8f5; }
    .gram-afast { background: rgba(200,100,100,0.15); color: #f56e6e; }
    .logged-check {
      position: absolute; top: 8px; right: 8px;
      background: var(--accent); color: var(--accent-fg);
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
    }
    .card-info { padding: 10px 12px 12px; }
    .card-info h3 { font-size: 13px; font-weight: 500; margin-bottom: 2px; line-height: 1.3; }
    .card-info .sci { font-size: 10px; color: var(--muted); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-stars { margin-top: 5px; color: var(--accent); font-size: 11px; letter-spacing: 1px; }
    .card-stars span { color: var(--muted); font-size: 10px; margin-left: 3px; letter-spacing: 0; }

    /* ── PROFILE BAR ── */
    .profile-section { padding: 20px 24px 24px; }
    .profile-card {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 14px; padding: 16px;
    }
    .profile-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent-dim); display: flex;
      align-items: center; justify-content: center;
      font-size: 15px; color: var(--accent); font-weight: 600;
      flex-shrink: 0;
    }
    .profile-info { flex: 1; }
    .profile-info .name { font-size: 14px; font-weight: 500; }
    .profile-info .stats { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .rank-pill {
      background: var(--accent-dim); color: var(--accent);
      font-size: 11px; font-weight: 500; padding: 5px 12px; border-radius: 8px;
    }

    /* ── NAV ── */
    .nav-tabs {
      display: flex; border-top: 0.5px solid var(--border);
      background: var(--surface); position: sticky; bottom: 0;
    }
    .nav-tab {
      flex: 1; padding: 12px 8px; text-align: center;
      font-size: 10px; color: var(--muted); cursor: pointer;
      border-top: 2px solid transparent; transition: all 0.15s;
    }
    .nav-tab.active { color: var(--accent); border-top-color: var(--accent); }
    .nav-tab i { display: block; font-size: 20px; margin-bottom: 2px; }

    /* ── DETAIL PANEL ── */
    .detail-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.88); align-items: flex-end; justify-content: center;
    }
    .detail-overlay.open { display: flex; }
    .detail-sheet {
      background: var(--surface); border-radius: 20px 20px 0 0;
      width: 100%; max-width: 680px; max-height: 92vh; overflow-y: auto;
    }
    .sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 14px auto 0; }

    .sheet-hero {
      position: relative; width: 100%; height: 220px;
      overflow: hidden; background: var(--surface2);
    }
    .sheet-hero img { width: 100%; height: 100%; object-fit: cover; }
    .sheet-hero .gradient { position: absolute; inset: 0; background: linear-gradient(to top, var(--surface) 0%, transparent 55%); }
    .sheet-hero .placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 80px; display:none; }

    .sheet-body { padding: 0 20px 32px; }
    .sheet-top { display: flex; align-items: flex-start; justify-content: space-between; padding: 14px 0 8px; }
    .sheet-top h2 { font-family: var(--serif); font-size: 22px; font-weight: 400; }
    .sheet-top .sci-name { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 2px; }
    .close-btn {
      background: var(--surface2); border: 0.5px solid var(--border);
      border-radius: 50%; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted); flex-shrink: 0; margin-left: 12px;
    }
    .close-btn:hover { color: var(--text); }

    .desc-text { font-size: 13px; color: #999; line-height: 1.7; margin-bottom: 16px; }

    .facts-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .fact {
      background: var(--surface2); border: 0.5px solid var(--border);
      border-radius: 10px; padding: 8px 14px;
      font-size: 12px; color: var(--muted);
    }
    .fact strong { display: block; font-size: 10px; color: var(--accent); font-weight: 500; margin-bottom: 2px; letter-spacing: 0.3px; }

    .action-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .btn-log {
      flex: 1; padding: 12px; border-radius: 10px; border: none;
      background: var(--accent); color: var(--accent-fg);
      font-size: 14px; font-weight: 500; cursor: pointer;
      font-family: var(--font); transition: background 0.15s;
    }
    .btn-log.logged { background: var(--accent-dim); color: var(--accent); }
    .btn-wishlist {
      padding: 12px 16px; border-radius: 10px;
      border: 0.5px solid var(--border); background: none;
      color: var(--muted); cursor: pointer; font-size: 20px;
    }
    .btn-wishlist:hover { color: var(--text); background: var(--surface2); }

    .divider { height: 0.5px; background: var(--border); margin: 4px 0 16px; }
    .reviews-heading { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

    .review {
      background: var(--bg); border: 0.5px solid var(--border);
      border-radius: 12px; padding: 14px; margin-bottom: 10px;
    }
    .review-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .rev-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--accent-dim); display: flex;
      align-items: center; justify-content: center;
      font-size: 11px; color: var(--accent); font-weight: 600; flex-shrink: 0;
    }
    .rev-name { font-size: 13px; font-weight: 500; }
    .rev-stars { margin-left: auto; color: var(--accent); font-size: 12px; }
    .rev-text { font-size: 12px; color: var(--muted); line-height: 1.65; }
    .rev-photo { width: 100%; border-radius: 8px; margin-top: 10px; max-height: 180px; object-fit: cover; }

    .write-box {
      background: var(--bg); border: 0.5px solid var(--border);
      border-radius: 12px; padding: 14px; margin-top: 4px;
    }
    .write-label { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .star-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .star-btn { background: none; border: none; cursor: pointer; font-size: 22px; color: var(--border); padding: 0; line-height: 1; }
    .star-btn.lit { color: var(--accent); }
    .upload-trigger {
      display: flex; align-items: center; gap: 8px;
      border: 0.5px dashed var(--border); border-radius: 8px;
      padding: 10px 14px; font-size: 12px; color: var(--muted);
      cursor: pointer; margin-bottom: 10px; transition: border-color 0.15s;
    }
    .upload-trigger:hover { border-color: #444; color: var(--text); }
    .upload-trigger input { display: none; }
    .photo-previews { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .photo-thumb { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; border: 0.5px solid var(--border); }
    .write-box textarea {
      width: 100%; background: var(--surface2); border: 0.5px solid var(--border);
      border-radius: 8px; padding: 12px; color: var(--text); font-size: 13px;
      resize: none; height: 80px; outline: none;
      font-family: var(--font); line-height: 1.6;
    }
    .write-box textarea::placeholder { color: var(--muted); }
    .write-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .photo-count { font-size: 11px; color: var(--muted); }
    .btn-post {
      background: var(--accent); color: var(--accent-fg);
      border: none; border-radius: 8px; padding: 9px 20px;
      font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--font);
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">micro<span>boxd</span></div>
  <div class="topbar-right">
    <div class="badge-count" id="loggedCount">0 logged</div>
  </div>
</div>

<div class="hero">
  <div class="hero-eyebrow">🦠 Bacteria Edition</div>
  <h1>What have you <em>encountered?</em></h1>
  <div class="search-wrap">
    <i class="ti ti-search"></i>
    <input type="text" id="searchInput" placeholder="Search by name, shape, or habitat..." oninput="renderGrid()" />
  </div>
</div>

<div class="filters">
  <div class="pill active" onclick="setFilter('all',this)">All</div>
  <div class="pill" onclick="setFilter('gram-positive',this)">Gram-positive</div>
  <div class="pill" onclick="setFilter('gram-negative',this)">Gram-negative</div>
  <div class="pill" onclick="setFilter('acid-fast',this)">Acid-fast</div>
  <div class="pill" onclick="setFilter('spirochete',this)">Spirochetes</div>
  <div class="pill" onclick="setFilter('anaerobe',this)">Anaerobes</div>
</div>

<div class="section-label">Popular bacteria</div>
<div class="micro-grid" id="microGrid"></div>

<div class="profile-section">
  <div class="profile-card">
    <div class="profile-avatar">YO</div>
    <div class="profile-info">
      <div class="name">Your collection</div>
      <div class="stats" id="profileStats">Start logging bacteria to build your profile</div>
    </div>
    <div class="rank-pill" id="rankPill">Novice</div>
  </div>
</div>

<div class="nav-tabs">
  <div class="nav-tab active"><i class="ti ti-home"></i>Discover</div>
  <div class="nav-tab"><i class="ti ti-book"></i>My log</div>
  <div class="nav-tab"><i class="ti ti-users"></i>Community</div>
  <div class="nav-tab"><i class="ti ti-user"></i>Profile</div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hero" id="sheetHero"></div>
    <div class="sheet-body">
      <div class="sheet-top">
        <div>
          <h2 id="sheetName"></h2>
          <div class="sci-name" id="sheetSci"></div>
        </div>
        <div class="close-btn" onclick="closeDetail()"><i class="ti ti-x"></i></div>
      </div>
      <p class="desc-text" id="sheetDesc"></p>
      <div class="facts-row" id="sheetFacts"></div>
      <div class="action-row">
        <button class="btn-log" id="logBtn" onclick="toggleLog()">+ Log encounter</button>
        <button class="btn-wishlist" title="Add to wishlist"><i class="ti ti-bookmark"></i></button>
      </div>
      <div class="divider"></div>
      <div class="reviews-heading">Community reviews</div>
      <div id="reviewsList"></div>
      <div class="write-box">
        <div class="write-label">Write your review</div>
        <div class="star-row" id="starRow">
          <button class="star-btn" onclick="setStar(1)">★</button>
          <button class="star-btn" onclick="setStar(2)">★</button>
          <button class="star-btn" onclick="setStar(3)">★</button>
          <button class="star-btn" onclick="setStar(4)">★</button>
          <button class="star-btn" onclick="setStar(5)">★</button>
        </div>
        <label class="upload-trigger">
          <i class="ti ti-camera" style="font-size:16px;"></i>
          Attach a microscope photo or encounter picture
          <input type="file" id="photoUpload" accept="image/*" multiple onchange="handlePhotos(event)" />
        </label>
        <div class="photo-previews" id="photoPreviews"></div>
        <textarea id="reviewText" placeholder="Describe your encounter — where you found it, what it looked like under the microscope, how you identified it..."></textarea>
        <div class="write-footer">
          <span class="photo-count" id="photoCount"></span>
          <button class="btn-post" onclick="submitReview()">Post review</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const bacteria = [
  {
    id:1, name:'E. coli', sci:'Escherichia coli',

    type:'anaerobe', gramLabel:'Gram +', gramClass:'gram-pos',

    emoji:'⚰️',
    desc:'Producer of the most lethal toxin known to science. An obligate anaerobe forming spores that survive boiling. Found in soil and improperly canned foods. Ironically, its toxin (Botox) is used cosmetically.',
    facts:[{l:'Shape',v:'Rod'},{l:'Gram',v:'Positive'},{l:'O₂',v:'Obligate anaerobe'},{l:'Risk',v:'Very High'},{l:'Spore',v:'Subterminal'}],
    reviews:[{user:'ToxinLab',stars:5,text:'Growing this requires a proper anaerobic cabinet. The drumstick-shaped spores are unmistakable. Terrifying organism.',photo:null}]
  },
  {
    id:9, name:'Pseudomonas aeruginosa', sci:'Pseudomonas aeruginosa',
    type:'gram-negative', gramLabel:'Gram −', gramClass:'gram-neg',
    img:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/Pseudomonas_aeruginosa_Gram.jpg/400px-Pseudomonas_aeruginosa_Gram.jpg',
    emoji:'🟢',
    desc:'The blue-green menace. An opportunistic pathogen infamous for infecting burn wounds and the lungs of cystic fibrosis patients. Produces pyocyanin giving cultures a distinctive blue-green hue.',
    facts:[{l:'Shape',v:'Rod'},{l:'Gram',v:'Negative'},{l:'Pigment',v:'Blue-green'},{l:'Risk',v:'High'},{l:'Motile',v:'Yes'}],
    reviews:[]
  },
  {
    id:10, name:'Lactobacillus acidophilus', sci:'Lactobacillus acidophilus',
    type:'gram-positive', gramLabel:'Gram +', gramClass:'gram-pos',
    img:'https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Lactobacillus_acidophilus_SEM.jpg/400px-Lactobacillus_acidophilus_SEM.jpg',
    emoji:'🥛',
    desc:'Your friendly gut resident. A probiotic bacterium that ferments lactose to lactic acid, lowering vaginal and gut pH to protect against pathogens. Found in yoghurt, kefir, and a healthy microbiome.',
    facts:[{l:'Shape',v:'Long rod'},{l:'Gram',v:'Positive'},{l:'Role',v:'Probiotic'},{l:'Risk',v:'None'},{l:'Product',v:'Lactic acid'}],
    reviews:[{user:'MicrobiomeFan',stars:5,text:'Found in every yoghurt I tested for my thesis. Healthy, beneficial, and beautiful long rods on Gram stain.',photo:null}]
  },
  {
    id:11, name:'Neisseria meningitidis', sci:'Neisseria meningitidis',
    type:'gram-negative', gramLabel:'Gram −', gramClass:'gram-neg',
    img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Neisseria_meningitidis.jpg/400px-Neisseria_meningitidis.jpg',
    emoji:'🧠',
    desc:'The meningitis bacterium. Diplococci that colonise the nasopharynx of carriers. When it crosses the blood-brain barrier, it can cause devastating bacterial meningitis within hours.',
    facts:[{l:'Shape',v:'Diplococcus'},{l:'Gram',v:'Negative'},{l:'Risk',v:'Very High'},{l:'Carrier rate',v:'~10%'},{l:'Capsule',v:'Yes'}],
    reviews:[]
  },
  {
    id:12, name:'Bacillus anthracis', sci:'Bacillus anthracis',
    type:'gram-positive', gramLabel:'Gram +', gramClass:'gram-pos',
    img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Bacillus_anthracis.jpg/400px-Bacillus_anthracis.jpg',
    emoji:'⚠️',
    desc:'The anthrax bacterium. Forms tough, resistant endospores that can survive in soil for decades. Large, square-ended rods that appear in bamboo-cane chains. A significant bioterrorism concern.',
    facts:[{l:'Shape',v:'Large rod'},{l:'Gram',v:'Positive'},{l:'Spore',v:'Central'},{l:'Risk',v:'Extreme'},{l:'Capsule',v:'Poly-D-glutamate'}],
    reviews:[]
  },
];

let currentFilter = 'all';
let currentMicrobe = null;
let currentStar = 0;
let logged = new Set();
let userReviews = [];
let pendingPhotos = [];

function renderGrid() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('microGrid');
  const filtered = bacteria.filter(b => {
    const matchType = currentFilter === 'all' || b.type === currentFilter;
    const matchQ = !q || b.name.toLowerCase().includes(q) || b.sci.toLowerCase().includes(q) || b.type.toLowerCase().includes(q);
    return matchType && matchQ;
  });
  if (filtered.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--muted);font-size:13px;">No bacteria found matching "${document.getElementById('searchInput').value}"</div>`;
    return;
  }
  grid.innerHTML = filtered.map(b => `
    <div class="micro-card" onclick="openDetail(${b.id})">
      <div class="card-img-wrap">
        <img class="card-img" src="${b.img}" alt="${b.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
        <div class="card-placeholder">
          <span class="emoji">${b.emoji}</span>
          <span class="label">No image</span>
        </div>
        <div class="gram-badge ${b.gramClass}">${b.gramLabel}</div>
        ${logged.has(b.id) ? '<div class="logged-check">✓</div>' : ''}
      </div>
      <div class="card-info">
        <h3>${b.name}</h3>
        <div class="sci">${b.sci}</div>
        <div class="card-stars">
          ${'★'.repeat(4)}${'☆'.repeat(1)}
          <span>${b.reviews.length + userReviews.filter(r=>r.id===b.id).length} reviews</span>
        </div>
      </div>
    </div>
  `).join('');
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

function openDetail(id) {
  currentMicrobe = bacteria.find(b => b.id === id);
  const hero = document.getElementById('sheetHero');
  hero.innerHTML = `
    <img src="${currentMicrobe.img}" alt="${currentMicrobe.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
    <div class="placeholder">${currentMicrobe.emoji}</div>
    <div class="gradient"></div>
  `;
  document.getElementById('sheetName').textContent = currentMicrobe.name;
  document.getElementById('sheetSci').textContent = currentMicrobe.sci;
  document.getElementById('sheetDesc').textContent = currentMicrobe.desc;
  document.getElementById('sheetFacts').innerHTML = currentMicrobe.facts.map(f =>
    `<div class="fact"><strong>${f.l}</strong>${f.v}</div>`).join('');
  const logBtn = document.getElementById('logBtn');
  logBtn.textContent = logged.has(id) ? '✓ Encounter logged' : '+ Log encounter';
  logBtn.className = 'btn-log' + (logged.has(id) ? ' logged' : '');
  pendingPhotos = [];
  document.getElementById('photoPreviews').innerHTML = '';
  document.getElementById('photoCount').textContent = '';
  document.getElementById('reviewText').value = '';
  currentStar = 0;
  document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('lit'));
  renderReviews();
  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function renderReviews() {
  const all = [...currentMicrobe.reviews, ...userReviews.filter(r => r.id === currentMicrobe.id)];
  const list = document.getElementById('reviewsList');
  if (all.length === 0) {
    list.innerHTML = '<p style="font-size:12px;color:var(--muted);margin-bottom:14px;">No reviews yet — be the first to log and review this organism!</p>';
    return;
  }
  list.innerHTML = all.map(r => `
    <div class="review">
      <div class="review-top">
        <div class="rev-avatar">${r.user.slice(0,2).toUpperCase()}</div>
        <span class="rev-name">${r.user}</span>
        <span class="rev-stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</span>
      </div>
      <div class="rev-text">${r.text}</div>
      ${r.photo ? `<img class="rev-photo" src="${r.photo}" alt="encounter photo" />` : ''}
    </div>`).join('');
}

function toggleLog() {
  if (!currentMicrobe) return;
  if (logged.has(currentMicrobe.id)) { logged.delete(currentMicrobe.id); }
  else { logged.add(currentMicrobe.id); }
  const logBtn = document.getElementById('logBtn');
  logBtn.textContent = logged.has(currentMicrobe.id) ? '✓ Encounter logged' : '+ Log encounter';
  logBtn.className = 'btn-log' + (logged.has(currentMicrobe.id) ? ' logged' : '');
  updateProfile();
  renderGrid();
}

function setStar(n) {
  currentStar = n;
  document.querySelectorAll('.star-btn').forEach((b,i) => b.classList.toggle('lit', i < n));
}

function handlePhotos(e) {
  Array.from(e.target.files).forEach(f => {
    const reader = new FileReader();
    reader.onload = ev => {
      pendingPhotos.push(ev.target.result);
      const prev = document.getElementById('photoPreviews');
      const img = document.createElement('img');
      img.className = 'photo-thumb';
      img.src = ev.target.result;
      prev.appendChild(img);
      document.getElementById('photoCount').textContent = `${pendingPhotos.length} photo${pendingPhotos.length>1?'s':''} attached`;
    };
    reader.readAsDataURL(f);
  });
}

function submitReview() {
  const text = document.getElementById('reviewText').value.trim();
  if (!currentStar) { alert('Please select a star rating!'); return; }
  if (!text) { alert('Please write something in your review!'); return; }
  userReviews.push({ id: currentMicrobe.id, user: 'You', stars: currentStar, text, photo: pendingPhotos[0] || null });
  if (!logged.has(currentMicrobe.id)) {
    logged.add(currentMicrobe.id);
    document.getElementById('logBtn').textContent = '✓ Encounter logged';
    document.getElementById('logBtn').className = 'btn-log logged';
  }
  document.getElementById('reviewText').value = '';
  pendingPhotos = [];
  document.getElementById('photoPreviews').innerHTML = '';
  document.getElementById('photoCount').textContent = '';
  currentStar = 0;
  document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('lit'));
  renderReviews();
  updateProfile();
}

function updateProfile() {
  const total = logged.size;
  const reviews = userReviews.length;
  document.getElementById('profileStats').textContent =
    total === 0 ? 'Start logging bacteria to build your profile'
    : `${total} logged · ${reviews} review${reviews !== 1 ? 's' : ''}`;
  document.getElementById('loggedCount').textContent = `${total} logged`;
  const ranks = [
    [0,'Novice'],[2,'Student'],[5,'Researcher'],[8,'Microbiologist'],[12,'Expert']
  ];
  const rank = [...ranks].reverse().find(r => total >= r[0]);
  document.getElementById('rankPill').textContent = rank[1];
}

document.getElementById('detailOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});

renderGrid();
</script>
</body>
</html>
